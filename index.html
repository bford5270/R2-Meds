<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Role 2 Meds">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Role 2 Meds | 1st Med Bn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d1117;
      --surf:   #161b22;
      --surf2:  #21262d;
      --border: #30363d;
      --text:   #e6edf3;
      --dim:    #8b949e;
      --accent: #58a6ff;
      --green:  #3fb950;
      --warn:   #f97316;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    body { display: flex; flex-direction: column; }

    /* ── HEADER ──────────────────────────── */
    header {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .hdr-title { flex: 1; }
    .hdr-title h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .hdr-title p  { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; }
    .icon-btn {
      background: var(--surf2); border: 1px solid var(--border); border-radius: 9px;
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--dim); flex-shrink: 0;
    }
    .icon-btn:active { opacity: .65; }

    /* ── SEARCH ──────────────────────────── */
    .search-wrap {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 8px 14px; display: none; flex-shrink: 0;
    }
    .search-wrap.open { display: block; }
    .search-wrap input {
      width: 100%; background: var(--surf2); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 13px; color: var(--text); font-size: 16px; outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--dim); }

    /* ── WEIGHT BAR ──────────────────────── */
    .weight-bar {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 8px 14px; display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; flex-shrink: 0;
    }
    .wt-lbl { font-size: 10px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .07em; flex-shrink: 0; }
    .wt-input-group {
      display: flex; align-items: center; gap: 4px;
      background: var(--surf2); border: 1px solid var(--border); border-radius: 9px;
      padding: 3px 8px 3px 6px; flex-shrink: 0;
    }
    .wt-input-group.active { border-color: var(--green); }
    .wt-input-group input {
      width: 50px; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; font-weight: 600; text-align: right;
      -moz-appearance: textfield;
    }
    .wt-input-group input::-webkit-outer-spin-button,
    .wt-input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .wt-input-group input::placeholder { color: var(--dim); font-weight: 400; }
    .wt-unit { font-size: 12px; color: var(--dim); flex-shrink: 0; }
    .wt-clear { background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0 0 0 2px; display: none; }
    .bracket-badge {
      font-size: 11px; font-weight: 700; color: var(--green);
      background: #0d2818; border: 1px solid #1a4a2a; border-radius: 6px;
      padding: 2px 7px; flex-shrink: 0; display: none;
    }
    .bracket-badge.show { display: block; }
    .weight-toggle { display: flex; background: var(--surf2); border: 1px solid var(--border);
      border-radius: 9px; overflow: hidden; flex-shrink: 0; }
    .wbtn { padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--dim);
      background: transparent; border: none; cursor: pointer; min-height: 32px; transition: all .15s; }
    .wbtn.active { background: var(--accent); color: #0d1117; }

    /* ── SCENARIO FILTER BAR ─────────────── */
    .filter-bar {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 7px 14px; display: flex; align-items: center; gap: 6px;
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .fpill {
      padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
      border: 1px solid var(--border); background: var(--surf2); color: var(--dim);
      cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s;
    }
    .fpill.active { border-color: var(--fc, var(--accent)); background: var(--fc, var(--accent)); color: #0d1117; }

    /* ── CATEGORY TABS ───────────────────── */
    .cat-tabs {
      background: var(--surf); border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 0 14px; font-size: 11px; font-weight: 700; color: var(--dim);
      background: transparent; border: none; border-bottom: 3px solid transparent;
      cursor: pointer; white-space: nowrap; text-transform: uppercase; letter-spacing: .05em;
      height: 40px; display: flex; align-items: center; flex-shrink: 0; transition: all .15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--cc, var(--accent)); }
    .cat-tabs.filtered .tab { opacity: .4; }
    .cat-tabs.filtered .tab.active { opacity: 1; }

    /* ── SCENARIO HEADER ─────────────────── */
    .scenario-hdr {
      display: none; align-items: center; gap: 8px;
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 6px 14px; flex-shrink: 0;
    }
    .scenario-hdr.show { display: flex; }
    .scenario-pill {
      display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px;
      font-weight: 700; border: 1px solid var(--fc, var(--accent)); color: var(--fc, var(--accent));
    }
    .scenario-count { font-size: 12px; color: var(--dim); }

    /* ── CONTENT ─────────────────────────── */
    .content {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    /* ── DISCLAIMER ──────────────────────── */
    .disclaimer {
      background: #1c130a; border: 1px solid #5a3010; border-radius: 9px;
      padding: 8px 12px; margin-bottom: 10px; font-size: 11px; color: var(--warn); line-height: 1.5;
    }

    /* ── DRUG CARDS ──────────────────────── */
    .drug-card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 8px; overflow: hidden;
    }
    .card-hdr {
      padding: 12px 13px; display: flex; align-items: center; gap: 9px;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .card-hdr:active { background: var(--surf2); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cc, var(--accent)); flex-shrink: 0; }
    .drug-name { font-size: 15px; font-weight: 700; flex: 1; }
    .cat-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      color: var(--cc, var(--accent));
      background: color-mix(in srgb, var(--cc, var(--accent)) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--cc, var(--accent)) 30%, transparent);
      border-radius: 5px; padding: 2px 6px; flex-shrink: 0;
    }
    .chevron { color: var(--dim); font-size: 10px; transition: transform .2s; flex-shrink: 0; }
    .drug-card.open .chevron { transform: rotate(180deg); }
    .card-body { display: none; border-top: 1px solid var(--border); }
    .drug-card.open .card-body { display: block; }

    /* ── DOSE DISPLAY ────────────────────── */
    .dose-single { padding: 11px 13px; }
    .dose-row { margin-bottom: 9px; }
    .dose-row:last-child { margin-bottom: 0; }
    .dose-lbl { font-size: 10px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }
    .dose-val { font-size: 14px; color: var(--text); line-height: 1.45; white-space: pre-line; }
    .dose-val.na { color: var(--surf2); }
    .dose-val.hl { color: #ffd60a; font-weight: 600; }
    .dose-both { display: grid; grid-template-columns: 1fr 1fr; }
    .dose-col { padding: 11px 13px; border-right: 1px solid var(--border); }
    .dose-col:last-child { border-right: none; }
    .col-hdr { font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }

    /* ── DRUG DETAILS ────────────────────── */
    .detail-sep { border: none; border-top: 1px solid var(--border); }
    .detail-meta { padding: 9px 13px; display: flex; flex-direction: column; gap: 5px; }
    .detail-row { display: flex; gap: 8px; }
    .detail-lbl {
      font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase;
      letter-spacing: .07em; flex-shrink: 0; min-width: 62px; padding-top: 2px;
    }
    .detail-val { font-size: 12px; color: var(--text); line-height: 1.45; }
    .detail-notes { padding: 0 13px 10px; display: flex; flex-direction: column; gap: 4px; }
    .dnote {
      font-size: 12px; line-height: 1.5; padding-left: 12px; position: relative; color: var(--dim);
    }
    .dnote::before { content: '\2022'; position: absolute; left: 0; }
    .dcaution { color: #f97316; }
    .dcaution::before { content: '\26A0'; font-size: 10px; }

    /* ── HYPOTENSION BADGE ───────────────── */
    .htn-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      color: #ef4444; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35);
      border-radius: 5px; padding: 2px 6px; flex-shrink: 0; white-space: nowrap;
    }

    /* ── NOTES TAB ───────────────────────── */
    .note-card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 15px; margin-bottom: 8px;
    }
    .note-card h3 { font-size: 11px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 9px; }
    .note-card ul { padding-left: 15px; }
    .note-card li { font-size: 13px; color: var(--dim); line-height: 1.6; margin-bottom: 4px; }

    /* ── EMPTY ───────────────────────────── */
    .empty { text-align: center; padding: 52px 24px; color: var(--dim); }
    .empty h3 { font-size: 16px; margin-bottom: 8px; }
    .empty p   { font-size: 14px; }

    /* ── INSTALL BANNER ─────────────────── */
    .install-banner {
      display: none; background: linear-gradient(135deg, #1a2332, #162230);
      border: 1px solid #1f4068; border-radius: 12px;
      padding: 12px 14px; margin: 10px 12px 0;
      flex-shrink: 0; animation: slideDown .3s ease;
    }
    .install-banner.show { display: block; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .install-inner { display: flex; align-items: center; gap: 10px; }
    .install-icon { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
    .install-text { flex: 1; }
    .install-text strong { font-size: 13px; color: var(--text); display: block; }
    .install-text span { font-size: 11px; color: var(--dim); }
    .install-btn {
      background: var(--accent); color: #0d1117; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .install-btn:active { opacity: .7; }
    .install-dismiss {
      background: none; border: none; color: var(--dim); font-size: 18px;
      cursor: pointer; padding: 0 0 0 4px; line-height: 1;
    }
    .offline-badge {
      display: none; font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--green); background: #0d2818;
      border: 1px solid #1a4a2a; border-radius: 6px; padding: 3px 8px; flex-shrink: 0;
    }
    .offline-badge.show { display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<header>
  <div class="hdr-title">
    <h1>Role 2 Medications</h1>
    <p>1st Medical Battalion</p>
  </div>
  <button class="icon-btn" onclick="toggleSearch()" aria-label="Search">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>
  <div class="offline-badge" id="offlineBadge">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
    Offline Ready
  </div>
</header>

<div class="install-banner" id="installBanner">
  <div class="install-inner">
    <img src="icons/icon-192.png" class="install-icon" alt="">
    <div class="install-text">
      <strong>Install Role 2 Meds</strong>
      <span>Add to home screen for offline use</span>
    </div>
    <button class="install-btn" id="installBtn" onclick="installApp()">Install</button>
    <button class="install-dismiss" onclick="dismissInstall()">&#x2715;</button>
  </div>
</div>

<div class="search-wrap" id="searchWrap">
  <input type="search" id="searchInput" placeholder="Search medications..."
    autocomplete="off" autocorrect="off" spellcheck="false"
    oninput="handleSearch(this.value)"
    onkeydown="if(event.key==='Escape')toggleSearch()">
</div>

<div class="weight-bar">
  <span class="wt-lbl">PT WT</span>
  <div class="wt-input-group" id="wtGroup">
    <input type="number" id="wtInput" min="1" max="300" placeholder="— kg"
      oninput="handleWeightInput(this.value)" onfocus="this.select()">
    <span class="wt-unit">kg</span>
    <button class="wt-clear" id="wtClear" onclick="clearWeight()">&#x2715;</button>
  </div>
  <div class="bracket-badge" id="bracketBadge"></div>
  <div class="weight-toggle">
    <button class="wbtn active" id="w75"   onclick="setWeight('75',true)">75 kg</button>
    <button class="wbtn"        id="wBoth" onclick="setWeight('both',true)">Both</button>
    <button class="wbtn"        id="w100"  onclick="setWeight('100',true)">100 kg</button>
  </div>
</div>

<div class="filter-bar"  id="filterBar"></div>
<div class="cat-tabs"    id="catTabs"></div>

<div class="scenario-hdr" id="scenarioHdr">
  <div class="scenario-pill" id="scenarioPill"></div>
  <span class="scenario-count" id="scenarioCount"></span>
</div>

<div class="content" id="content"></div>

<script>
'use strict';

/* ── CATEGORIES ──────────────────────────── */
const CATS = [
  { key: 'vasopressors',  label: 'Vasopressors',  color: '#ef4444' },
  { key: 'sedatives',     label: 'Sedatives',      color: '#3b82f6' },
  { key: 'nmb',           label: 'NM Blockers',    color: '#a855f7' },
  { key: 'resuscitation', label: 'Resuscitation',  color: '#f97316' },
  { key: 'antibiotics',   label: 'Antibiotics',    color: '#22c55e' },
  { key: 'other',         label: 'Other',          color: '#eab308' },
  { key: 'notes',         label: 'Notes',          color: '#6b7280' },
];

/* ── SCENARIO FILTERS ────────────────────── */
const FILTERS = [
  { key: 'all',        label: 'All Drugs',       color: '#58a6ff' },
  { key: 'procedural', label: 'Procedural Sed',  color: '#0ea5e9' },
  { key: 'rsi',        label: 'RSI / Airway',    color: '#ef4444' },
  { key: 'analgesia',  label: 'Analgesia',       color: '#f97316' },
  { key: 'sedation',   label: 'Sedation',        color: '#3b82f6' },
  { key: 'cardiac',    label: 'Cardiac',         color: '#ec4899' },
  { key: 'reversal',   label: 'Reversal',        color: '#22c55e' },
];

/* ── MEDICATION DATA ─────────────────────── */
/*
  Each drug:
    tags:     string[]   — which scenario filters include this drug
    subdoses: { [filter]: { push75, push100, drip75?, drip100?, dripLabel? } }
    details:  { onset, duration, max, repeat, notes[], cautions[] }
*/
const MEDS = {

  vasopressors: [
    {
      name: 'Epinephrine',
      tags: ['cardiac'],
      kg75:  { push: '1 mg (cardiac arrest)',  dripStart: '3.75–7.5 mcg/min',  dripRange: '3.75–150 mcg/min' },
      kg100: { push: '1 mg (cardiac arrest)',  dripStart: '5–10 mcg/min',       dripRange: '5–200 mcg/min' },
      details: {
        onset:    'Immediate IV',
        duration: '5–10 min (infusion titrated to effect)',
        max:      'No defined max; titrate to hemodynamic response',
        repeat:   'Cardiac arrest: 1 mg IV every 3–5 min',
        notes:    ['Central or IO line preferred for infusion', 'Extravasation causes tissue necrosis — phentolamine antidote'],
        cautions: ['Tachyarrhythmias at higher doses', 'Peripheral IV: dilute well and monitor site closely'],
      },
    },
    {
      name: 'Norepinephrine',
      tags: ['cardiac'],
      kg75:  { push: '—', dripStart: '7.5–15 mcg/min',  dripRange: '7.5–150 mcg/min' },
      kg100: { push: '—', dripStart: '10–20 mcg/min',   dripRange: '10–200 mcg/min' },
      details: {
        onset:    '1–2 min IV',
        duration: '1–2 min after stopping infusion',
        max:      'No defined max; titrate to MAP goal (65 mmHg)',
        repeat:   'N/A — continuous infusion only',
        notes:    ['First-line vasopressor for septic shock (Surviving Sepsis Guidelines)', 'Central line strongly preferred for infusion'],
        cautions: ['Extravasation: severe tissue necrosis — phentolamine antidote', 'Increases afterload — use caution in cardiogenic shock'],
      },
    },
    {
      name: 'Phenylephrine',
      tags: ['cardiac'],
      kg75:  { push: '50–200 mcg', dripStart: '7.5–75 mcg/min',  dripRange: '7.5–750 mcg/min' },
      kg100: { push: '50–200 mcg', dripStart: '10–100 mcg/min',  dripRange: '10–1000 mcg/min' },
      details: {
        onset:    'Immediate IV push',
        duration: '15–20 min (push); continuous with infusion',
        max:      'Push: 200 mcg per dose; Infusion: titrate to effect',
        repeat:   'Push: every 10–15 min PRN',
        notes:    ['Pure α1 agonist — no inotropic effect', 'Preferred in neurogenic shock and spinal anesthesia hypotension'],
        cautions: ['Reflex bradycardia — avoid if heart rate already low', 'Reduces cardiac output in patients with depressed EF'],
      },
    },
    {
      name: 'Dopamine',
      tags: ['cardiac'],
      kg75:  { push: '—', dripStart: '150–375 mcg/min',  dripRange: '150–1500 mcg/min' },
      kg100: { push: '—', dripStart: '200–500 mcg/min',  dripRange: '200–2000 mcg/min' },
      details: {
        onset:    '2–4 min',
        duration: 'Minutes after stopping infusion',
        max:      '20 mcg/kg/min (some protocols up to 50)',
        repeat:   'N/A — continuous infusion only',
        notes:    ['Low dose (1–5 mcg/kg/min): dopaminergic (renal perfusion)', 'Mid dose (5–15): β1 inotrope/chronotrope', 'High dose (>15): α1 vasoconstriction'],
        cautions: ['More arrhythmogenic than norepinephrine (AHA/ACC)', 'No longer first-line for most indications'],
      },
    },
  ],

  sedatives: [
    {
      name: 'Propofol',
      tags: ['sedation', 'rsi', 'procedural'],
      htnRisk: true,
      subdoses: {
        sedation:   { push75: '20–40 mg',   push100: '25–50 mg',  drip75: '25–200 mcg/kg/min', drip100: '25–200 mcg/kg/min', dripLabel: 'Sedation infusion' },
        rsi:        { push75: '20–40 mg',   push100: '25–50 mg' },
        procedural: { push75: '37.5 mg initial; 18–19 mg q3–5 min PRN (0.5 mg/kg → 0.25 mg/kg)', push100: '50 mg initial; 25 mg q3–5 min PRN (0.5 mg/kg → 0.25 mg/kg)' },
      },
      kg75:  { push: '20–40 mg',  dripStart: '25–50 mcg/kg/min', dripRange: '25–200 mcg/kg/min' },
      kg100: { push: '25–50 mg',  dripStart: '25–50 mcg/kg/min', dripRange: '25–200 mcg/kg/min' },
      details: {
        onset:    '15–45 sec IV',
        duration: '5–10 min (short bolus)',
        max:      'Infusion: 4 mg/kg/hr for routine sedation (PRIS risk at higher doses/prolonged use)',
        repeat:   'Bolus: every 5–10 min PRN; procedural: 0.25 mg/kg supplemental q3–5 min',
        notes:    ['Lipid emulsion: 1.1 kcal/mL — count toward nutritional goal', 'Pain on injection — lidocaine 20–40 mg IV prior reduces discomfort'],
        cautions: ['HYPOTENSION: vasodilator + negative inotrope — can cause severe hypotension with bolus, especially in hypovolemic or hemodynamically unstable patients. Reduce dose to 0.1–0.2 mg/kg or avoid entirely in these patients', 'Propofol Infusion Syndrome (PRIS) at >4 mg/kg/hr or >48 hr — monitor triglycerides, lactate, CK', 'Apnea common with bolus — have airway equipment ready'],
      },
    },
    {
      name: 'Ketamine',
      tags: ['rsi', 'analgesia', 'sedation', 'procedural'],
      subdoses: {
        analgesia:  { push75: '7.5–22.5 mg',              push100: '10–30 mg',              drip75: '7.5–30 mg/hr',   drip100: '10–40 mg/hr',  dripLabel: 'Analgesia infusion' },
        rsi:        { push75: '150 mg',                    push100: '200 mg' },
        sedation:   { push75: '75–337.5 mg (dissociative)', push100: '100–450 mg (dissociative)', drip75: '7.5–45 mg/hr', drip100: '10–60 mg/hr', dripLabel: 'Sedation infusion' },
        procedural: { push75: '75 mg (1 mg/kg); supplement 0.5 mg/kg PRN q10 min', push100: '100 mg (1 mg/kg); supplement 0.5 mg/kg PRN q10 min' },

/* ── NOTES DATA ──────────────────────────── */
const NOTES = [
  {
    title: 'Ketamine Dosing',
    items: [
      'Sub-dissociative analgesia: 0.1–0.3 mg/kg IV bolus; infusion 0.1–0.4 mg/kg/hr',

      'Induction / RSI: 1–2 mg/kg IV (FDA-approved range 1–4.5 mg/kg)',

    ],
  },
  {

    items: [

      'Antibiotic dosing is typical treatment doses; surgical prophylaxis may differ',

      'Drip rates in absolute units (mcg/min or mg/min) — verify weight-based dosing against protocols',
    ],
  },
];

/* ── STATE ───────────────────────────────── */
let currentCat    = 'vasopressors';
let currentWeight = '75';
let activeFilter  = 'all';
let searchQuery   = '';
let searchOpen    = false;
let patientKg     = null;

/* ── WEIGHT CALCULATOR ───────────────────── */
function handleWeightInput(val) {
  const kg    = parseFloat(val);
  const group = document.getElementById('wtGroup');
  const clear = document.getElementById('wtClear');
  const badge = document.getElementById('bracketBadge');
  if (!val || isNaN(kg) || kg <= 0) {
    patientKg = null;
    group.classList.remove('active');
    clear.style.display = 'none';
    badge.classList.remove('show');
    return;
  }
  patientKg = kg;
  group.classList.add('active');
  clear.style.display = 'block';
  const bracket = kg < 87.5 ? '75' : '100';
  badge.textContent = '\u2248' + bracket + '\u202fkg dosing';
  badge.classList.add('show');
  if (currentWeight !== bracket) setWeight(bracket, false);
  else renderContent();
}

function clearWeight() {
  patientKg = null;
  document.getElementById('wtInput').value = '';
  document.getElementById('wtGroup').classList.remove('active');
  document.getElementById('wtClear').style.display = 'none';
  document.getElementById('bracketBadge').classList.remove('show');
}

function setWeight(w, clearPt = true) {
  if (clearPt) clearWeight();
  currentWeight = w;
  document.getElementById('w75').classList.toggle('active',   w === '75');
  document.getElementById('wBoth').classList.toggle('active', w === 'both');
  document.getElementById('w100').classList.toggle('active',  w === '100');
  renderContent();
}

/* ── SEARCH ──────────────────────────────── */
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchWrap').classList.toggle('open', searchOpen);
  if (searchOpen) document.getElementById('searchInput').focus();
  else {
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    renderContent();
  }
}

function handleSearch(q) {
  searchQuery = q.toLowerCase().trim();
  renderContent();
}

/* ── FILTERS ─────────────────────────────── */
function renderFilterBar() {
  document.getElementById('filterBar').innerHTML = FILTERS.map(f => `
    <button class="fpill ${f.key === activeFilter ? 'active' : ''}"
      style="--fc:${f.color}" onclick="setFilter('${f.key}')">${f.label}</button>`).join('');
}

function setFilter(key) {
  activeFilter = key;
  renderFilterBar();
  renderTabs();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

/* ── TABS ────────────────────────────────── */
function renderTabs() {
  const el = document.getElementById('catTabs');
  el.className = 'cat-tabs' + (activeFilter !== 'all' ? ' filtered' : '');
  el.innerHTML = CATS.map(c => `
    <button class="tab ${c.key === currentCat ? 'active' : ''}"
      style="--cc:${c.color}" onclick="setCategory('${c.key}')">${c.label}</button>`).join('');
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest' });
}

function setCategory(key) {
  currentCat   = key;
  activeFilter = 'all';
  searchQuery  = '';
  if (searchOpen) {
    searchOpen = false;
    document.getElementById('searchWrap').classList.remove('open');
    document.getElementById('searchInput').value = '';
  }
  renderFilterBar();
  renderTabs();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

/* ── DOSE HTML HELPERS ───────────────────── */
function dv(v, hl) {
  const na = !v || v === '—';
  return `<div class="dose-val${na ? ' na' : hl ? ' hl' : ''}">${v || '—'}</div>`;
}
function hasDrip(d) {
  return (d.dripStart && d.dripStart !== '—') || (d.dripRange && d.dripRange !== '—');
}
function fullSingleHTML(d) {
  const drip = hasDrip(d);
  return `<div class="dose-single">
    <div class="dose-row"><div class="dose-lbl">Push Dose</div>${dv(d.push)}</div>
    ${drip ? `<div class="dose-row"><div class="dose-lbl">Drip Start</div>${dv(d.dripStart)}</div>
    <div class="dose-row"><div class="dose-lbl">Drip Range</div>${dv(d.dripRange)}</div>` : ''}
  </div>`;
}
function fullBothHTML(med) {
  const d75 = med.kg75, d100 = med.kg100;
  const drip = hasDrip(d75) || hasDrip(d100);
  const col = (d, lbl) => `<div class="dose-col">
    <div class="col-hdr">${lbl}</div>
    <div class="dose-row"><div class="dose-lbl">Push</div>${dv(d.push)}</div>
    ${drip ? `<div class="dose-row"><div class="dose-lbl">Drip Start</div>${dv(d.dripStart)}</div>
    <div class="dose-row"><div class="dose-lbl">Drip Range</div>${dv(d.dripRange)}</div>` : ''}
  </div>`;
  return `<div class="dose-both">${col(d75,'75 kg')}${col(d100,'100 kg')}</div>`;
}
function subSingleHTML(sub, wt) {
  const push = wt === '75' ? sub.push75 : sub.push100;
  const drip = wt === '75' ? sub.drip75  : sub.drip100;
  return `<div class="dose-single">
    <div class="dose-row"><div class="dose-lbl">Push Dose</div>${dv(push, true)}</div>
    ${drip ? `<div class="dose-row"><div class="dose-lbl">${sub.dripLabel||'Infusion'}</div>${dv(drip,true)}</div>` : ''}
  </div>`;
}
function subBothHTML(sub) {
  const drip = sub.drip75 || sub.drip100;
  const col = (push, d, lbl) => `<div class="dose-col">
    <div class="col-hdr">${lbl}</div>
    <div class="dose-row"><div class="dose-lbl">Push</div>${dv(push, true)}</div>
    ${drip ? `<div class="dose-row"><div class="dose-lbl">${sub.dripLabel||'Infusion'}</div>${dv(d,true)}</div>` : ''}
  </div>`;
  return `<div class="dose-both">${col(sub.push75,sub.drip75,'75 kg')}${col(sub.push100,sub.drip100,'100 kg')}</div>`;
}

/* ── DETAILS HTML ────────────────────────── */
function detailsHTML(d) {
  if (!d) return '';
  const rows = [
    ['Onset',    d.onset],
    ['Duration', d.duration],
    ['Max Dose', d.max],
    ['Repeat',   d.repeat],
  ].filter(r => r[1]);

  const meta = rows.length ? `<div class="detail-meta">${
    rows.map(([lbl,val]) => `<div class="detail-row">
      <span class="detail-lbl">${lbl}</span>
      <span class="detail-val">${val}</span>
    </div>`).join('')
  }</div>` : '';

  const notesHTML  = (d.notes    || []).map(n => `<div class="dnote">${n}</div>`).join('');
  const cautHTML   = (d.cautions || []).map(c => `<div class="dnote dcaution">${c}</div>`).join('');
  const noteBlock  = (notesHTML || cautHTML)
    ? `<div class="detail-notes">${notesHTML}${cautHTML}</div>` : '';

  return `<hr class="detail-sep">${meta}${noteBlock}`;
}

/* ── CARD HTML ───────────────────────────── */
function buildDoseHTML(med, filter) {
  const sub = filter !== 'all' && med.subdoses && med.subdoses[filter];
  if (currentWeight === 'both') return sub ? subBothHTML(sub) : fullBothHTML(med);
  const wt = currentWeight;
  return sub ? subSingleHTML(sub, wt) : fullSingleHTML(wt === '75' ? med.kg75 : med.kg100);
}

function cardHTML(med, catColor, catLabel, showBadge, expanded) {
  const body = buildDoseHTML(med, activeFilter) + detailsHTML(med.details);
  return `<div class="drug-card${expanded ? ' open' : ''}" style="--cc:${catColor}">
    <div class="card-hdr" onclick="this.parentElement.classList.toggle('open')">
      <div class="cat-dot"></div>
      <span class="drug-name">${med.name}</span>
      ${med.htnRisk ? '<span class="htn-badge">&#x26A0; Hypotension</span>' : ''}
      ${showBadge ? `<span class="cat-badge">${catLabel}</span>` : ''}
      <span class="chevron">&#9660;</span>
    </div>
    <div class="card-body">${body}</div>
  </div>`;
}

/* ── RENDER CONTENT ──────────────────────── */
const DISCLAIMER = `<div class="disclaimer">
  <strong>REFERENCE ONLY —</strong> Verify all doses against current SOPs and clinical judgment.
  For use by qualified medical personnel only.
</div>`;

function renderContent() {
  const el      = document.getElementById('content');
  const scenHdr = document.getElementById('scenarioHdr');

  /* SEARCH */
  if (searchQuery) {
    scenHdr.classList.remove('show');
    const hits = [];
    for (const cat of CATS) {
      if (cat.key === 'notes') continue;
      for (const med of (MEDS[cat.key] || []))
        if (med.name.toLowerCase().includes(searchQuery)) hits.push({ med, cat });
    }
    el.innerHTML = hits.length
      ? DISCLAIMER + hits.map(h => cardHTML(h.med, h.cat.color, h.cat.label, true, true)).join('')
      : `<div class="empty"><h3>No results</h3><p>No medications match "${searchQuery}"</p></div>`;
    return;
  }

  /* SCENARIO FILTER */
  if (activeFilter !== 'all') {
    const fObj = FILTERS.find(f => f.key === activeFilter);
    const hits = [];
    for (const cat of CATS) {
      if (cat.key === 'notes') continue;
      for (const med of (MEDS[cat.key] || []))
        if ((med.tags || []).includes(activeFilter)) hits.push({ med, cat });
    }
    scenHdr.classList.add('show');
    document.getElementById('scenarioPill').textContent = fObj.label;
    document.getElementById('scenarioPill').style.setProperty('--fc', fObj.color);
    document.getElementById('scenarioCount').textContent = `${hits.length} drug${hits.length !== 1 ? 's' : ''}`;
    el.innerHTML = hits.length
      ? DISCLAIMER + hits.map(h => cardHTML(h.med, h.cat.color, h.cat.label, true, true)).join('')
      : `<div class="empty"><h3>No drugs in this scenario</h3></div>`;
    return;
  }

  scenHdr.classList.remove('show');

  /* NOTES TAB */
  if (currentCat === 'notes') {
    el.innerHTML = DISCLAIMER + NOTES.map(n => `
      <div class="note-card">
        <h3>${n.title}</h3>
        <ul>${n.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`).join('');
    return;
  }

  /* NORMAL CATEGORY */
  const catObj = CATS.find(c => c.key === currentCat);
  const drugs  = MEDS[currentCat] || [];
  el.innerHTML = DISCLAIMER + drugs.map(med => cardHTML(med, catObj.color, catObj.label, false, true)).join('');
}

/* ── INIT ────────────────────────────────── */
function init() { renderFilterBar(); renderTabs(); renderContent(); }
init();

/* ── PWA: SERVICE WORKER + INSTALL ───────── */
let deferredPrompt = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
    // Show offline badge once SW is active
    if (reg.active) showOfflineBadge();
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') showOfflineBadge();
      });
    });
  }).catch(err => console.log('SW registration failed:', err));
}

function showOfflineBadge() {
  const badge = document.getElementById('offlineBadge');
  if (badge) badge.classList.add('show');
}

// Listen for beforeinstallprompt (Chrome/Edge/Android)
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('r2m_install_dismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('r2m_install_dismissed', '1');
}

// If already installed as PWA, hide banner
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// Detect standalone mode (already installed)
if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
  showOfflineBadge();
}
</script>
